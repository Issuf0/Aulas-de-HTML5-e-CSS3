<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1>Registro</h1>
        <form>
            Nome: <input type="text" placeholder="Insira seu nome"> <br>
            Apelido: <input type="text" placeholder="Insira o seu apelido"> <br>
            Data de Nascimento: <input type="date"> <br>
            Nome completo do pai: <input type="text" placeholder="Insira o nome do pai"> <br>
            Nome completo do mãe: <input type="text" placeholder="Insira o nome da mãe"> <br>
            Local de nascimento: <input type="text" placeholder="Local de nascimento"> <br>

            <button>Registrar</button> 
            <button>Limpar</button>
        </form>
    </div>
</body>
</html>
